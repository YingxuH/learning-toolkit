name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject API keys from secrets
        run: |
          cat > js/config.local.js << 'SCRIPT'
          // Auto-generated during deployment - DO NOT COMMIT
          (function() {
            if (typeof setGeminiKey === 'function') {
              var existing = localStorage.getItem('lt_gemini_key');
              if (!existing) {
                setGeminiKey('${{ secrets.GEMINI_API_KEY }}');
              }
            }
          })();
          SCRIPT

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
