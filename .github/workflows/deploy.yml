name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject secrets into config
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_API_KEY }}
          FB_CONFIG: ${{ secrets.FIREBASE_CONFIG }}
        run: |
          # Inject Gemini API key
          cat > js/config.local.js << ENDSCRIPT
          // Auto-generated at deploy time from GitHub Secrets
          (function() {
            // Set Gemini key if not already in localStorage
            if (typeof setGeminiKey === 'function') {
              var existing = localStorage.getItem('lt_gemini_key');
              if (!existing) {
                setGeminiKey('${GEMINI_KEY}');
              }
            }

            // Set Firebase config if secret is provided
            var fbConfig = null;
            try {
              fbConfig = JSON.parse('${FB_CONFIG}');
            } catch(e) {}

            if (fbConfig && fbConfig.apiKey && typeof firebase !== 'undefined') {
              try {
                if (!firebase.apps.length) {
                  firebase.initializeApp(fbConfig);
                  console.log('[Firebase] Initialized from deploy config');
                }
              } catch(e) {
                console.log('[Firebase] Init error:', e.message);
              }
            }
          })();
          ENDSCRIPT

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
