<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Search Module Tests</title>
    <style>
        body { font-family: monospace; padding: 20px; background: #1a1a2e; color: #e0e0e0; }
        .pass { color: #4caf50; }
        .fail { color: #f44336; }
        .test-group { margin: 16px 0; padding: 12px; border: 1px solid #333; border-radius: 4px; }
        .test-group h3 { color: #6c8aff; margin-bottom: 8px; }
        #summary { margin-top: 24px; padding: 16px; border-top: 2px solid #6c8aff; font-size: 1.2em; }
    </style>
</head>
<body>
    <h1>Search Module Unit Tests</h1>
    <div id="test-results"></div>
    <div id="summary"></div>

    <div style="display:none;">
        <div class="search-container">
            <input type="text" id="global-search" placeholder="Search content..." autocomplete="off">
            <div id="search-results" class="search-dropdown hidden"></div>
        </div>
    </div>

    <script>
    window.App = { scrollToSection: function() {} };
    </script>

    <script src="../js/content.js"></script>
    <script src="../js/search.js"></script>
    <script>
    (function() {
        let passed = 0, failed = 0, total = 0;
        const results = document.getElementById('test-results');

        function assert(condition, testName, details) {
            total++;
            const status = condition ? 'PASS' : 'FAIL';
            if (condition) passed++; else failed++;
            const cls = condition ? 'pass' : 'fail';
            results.innerHTML += `<div class="${cls}">[${status}] ${testName}${details && !condition ? ' - ' + details : ''}</div>`;
        }

        function group(name) { results.innerHTML += `<div class="test-group"><h3>${name}</h3>`; }
        function endGroup() { results.innerHTML += `</div>`; }

        const searchInput = document.getElementById('global-search');
        const searchResults = document.getElementById('search-results');

        function triggerSearch(query) {
            searchInput.value = query;
            searchInput.dispatchEvent(new Event('input'));
        }

        function wait(ms) {
            return new Promise(resolve => setTimeout(resolve, ms));
        }

        async function runTests() {
            // === Test Group 1: TEXTBOOK exists ===
            group('TEXTBOOK Data');
            assert(typeof TEXTBOOK !== 'undefined', 'TEXTBOOK is defined');
            assert(TEXTBOOK.parts.length >= 4, 'Has 4+ parts');
            endGroup();

            // === Test Group 2: DOM elements ===
            group('DOM Elements');
            assert(searchInput !== null, 'Search input exists');
            assert(searchResults !== null, 'Results div exists');
            endGroup();

            // === Test Group 3: Search "attention" ===
            group('Search: "attention"');
            triggerSearch('attention');
            await wait(300);
            const items3 = searchResults.querySelectorAll('.search-result-item');
            assert(items3.length > 0, 'Returns results: ' + items3.length);
            assert(!searchResults.classList.contains('hidden'), 'Dropdown visible');
            endGroup();

            // === Test Group 4: Search "speculative decoding" ===
            group('Search: "speculative decoding"');
            triggerSearch('speculative decoding');
            await wait(300);
            const items4 = searchResults.querySelectorAll('.search-result-item');
            assert(items4.length > 0, 'Returns results: ' + items4.length);
            endGroup();

            // === Test Group 5: Case insensitivity ===
            group('Case Insensitivity');
            triggerSearch('VLLM');
            await wait(300);
            const upperCount = searchResults.querySelectorAll('.search-result-item').length;
            triggerSearch('vllm');
            await wait(300);
            const lowerCount = searchResults.querySelectorAll('.search-result-item').length;
            assert(upperCount > 0, 'VLLM returns results');
            assert(upperCount === lowerCount, 'Same count: ' + upperCount + ' vs ' + lowerCount);
            endGroup();

            // === Test Group 6: Short query ===
            group('Short Query');
            triggerSearch('a');
            await wait(300);
            assert(searchResults.classList.contains('hidden'), 'Single char hides dropdown');
            triggerSearch('');
            await wait(300);
            assert(searchResults.classList.contains('hidden'), 'Empty hides dropdown');
            endGroup();

            // === Test Group 7: Special chars ===
            group('Special Characters');
            let noCrash = true;
            for (const q of ['.*+?^${}()|[]\\\\', '<script>', '(((', 'C++']) {
                try { triggerSearch(q); } catch(e) { noCrash = false; }
            }
            await wait(300);
            assert(noCrash, 'Special chars do not crash');
            endGroup();

            // === Test Group 8: Result structure ===
            group('Result Structure');
            triggerSearch('transformer');
            await wait(300);
            const items8 = searchResults.querySelectorAll('.search-result-item');
            if (items8.length > 0) {
                assert(items8[0].querySelector('.search-result-chapter') !== null, 'Has chapter info');
                assert(items8[0].querySelector('.search-result-text') !== null, 'Has snippet text');
                assert(items8[0].getAttribute('data-section') !== null, 'Has data-section');
            } else {
                assert(false, 'No results for "transformer"');
            }
            endGroup();

            // === Test Group 9: Max results ===
            group('Results Limit');
            triggerSearch('the');
            await wait(300);
            const items9 = searchResults.querySelectorAll('.search-result-item');
            assert(items9.length <= 10, 'Capped at 10: ' + items9.length);
            endGroup();

            // === Summary ===
            const summaryEl = document.getElementById('summary');
            const allPass = failed === 0;
            summaryEl.innerHTML = `<span class="${allPass ? 'pass' : 'fail'}">${allPass ? 'ALL TESTS PASSED' : 'SOME TESTS FAILED'}: ${passed}/${total} passed, ${failed} failed</span>`;
        }

        setTimeout(runTests, 500);
    })();
    </script>
</body>
</html>
